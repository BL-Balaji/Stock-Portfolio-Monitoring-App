server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - JwtAuthenticationFilter

        - id: portfolio-service
          uri: lb://portfolio-service
          predicates:
            - Path=/api/portfolios/**, /api/holdings/**
          filters:
            - JwtAuthenticationFilter

        - id: price-fetcher-service
          uri: lb://price-fetcher-service
          predicates:
            - Path=/api/prices/**
          filters:
            - JwtAuthenticationFilter

        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/api/alerts/**
          filters:
            - JwtAuthenticationFilter

        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**
          filters:
            - JwtAuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: stock-portfolio-monitoring-app-secret-key-2024-very-long-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
