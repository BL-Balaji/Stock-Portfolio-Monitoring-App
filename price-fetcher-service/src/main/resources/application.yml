server:
  port: 8083

spring:
  application:
    name: price-fetcher-service
  datasource:
    url: jdbc:mysql://localhost:3306/stock_portfolio_db
    username: root
    password: Pass@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cache:
    type: simple

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# External API configuration
external:
  api:
    twelvedata:
      key: YOUR_TWELVEDATA_API_KEY
      url: https://api.twelvedata.com
    use-mock: true  # Set to false when real API key is configured

# Price fetch interval in milliseconds (default: 5 minutes)
price:
  fetch:
    interval: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
